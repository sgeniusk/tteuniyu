name: p0a-worker

# T-006 P0a Foundation — RSS 워커 GHA cron.
#
# PR #28+ T-006 Step 4 (embed + cluster) 머지로 cron 활성화 — 시간당 1회 dry-run.
# 실 ingest는 사용자가 매체 ToS 활성화 + Supabase 셋업 후 workflow_dispatch로 전환.
# Step 5 (LLM + Trust Signal) 합류 시 cron command를 ingest로 변경 권고.
#
# Secrets 등록 (repo Settings → Secrets and variables → Actions).
#  필수 (실 ingest 시) — SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#  필수 (Step 5 LLM 시) — GEMINI_API_KEY
#  권장 — SLACK_WEBHOOK_URL (ADR-014 비용 cap alert)

on:
  workflow_dispatch:
    inputs:
      command:
        description: 워커 subcommand
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - ingest
          - cluster-pending
  # T-006 Step 4 cron 활성화 — 매 시간 정각 ingest (cluster 자동화는 PR #48에서).
  schedule:
    - cron: '0 * * * *'  # 매 시간 정각 (UTC)

# 동일 워크플로우 동시 실행 방지 (cron 중복 방지)
concurrency:
  group: p0a-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: apps/worker/uv.lock

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run command (${{ inputs.command || 'dry-run' }})
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LOG_FORMAT: json
          LOG_LEVEL: INFO
        # schedule trigger 시 inputs 없음 → dry-run fallback.
        # subcommand별 인자가 다르므로 분기 (dry-run/ingest는 --whitelist,
        # cluster-pending은 --lookback-hours만 받음).
        run: |
          COMMAND="${{ inputs.command || 'dry-run' }}"
          case "$COMMAND" in
            dry-run|ingest)
              uv run worker "$COMMAND" --whitelist ../../config/sources_whitelist.yaml
              ;;
            cluster-pending)
              uv run worker cluster-pending --lookback-hours 24
              ;;
            *)
              echo "Unknown command: $COMMAND"
              exit 2
              ;;
          esac
