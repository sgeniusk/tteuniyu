name: p0a-worker

# T-006 P0a Foundation — RSS 워커 GHA cron.
#
# PR #28+ T-006 Step 4 (embed + cluster) 머지로 cron 활성화 — 시간당 1회 dry-run.
# 실 ingest는 사용자가 매체 ToS 활성화 + Supabase 셋업 후 workflow_dispatch로 전환.
# Step 5 (LLM + Trust Signal) 합류 시 cron command를 ingest로 변경 권고.
#
# Secrets 등록 (repo Settings → Secrets and variables → Actions).
#  필수 (실 ingest 시) — SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#  필수 (Step 5 LLM 시) — GEMINI_API_KEY
#  권장 — SLACK_WEBHOOK_URL (ADR-014 비용 cap alert)

on:
  workflow_dispatch:
    inputs:
      command:
        description: 워커 subcommand
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - ingest
          - cluster-pending
  # T-006 Step 4 cron 활성화 — 매 시간 정각 ingest (cluster 자동화는 PR #48에서).
  schedule:
    # 테스트 단계 — 야간 휴식 + 주간 저빈도. UTC 0/4/8/12 = 한국 09/13/17/21시.
    - cron: '0 0,4,8,12 * * *'

# 동일 워크플로우 동시 실행 방지 (cron 중복 방지)
concurrency:
  group: p0a-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: apps/worker/uv.lock

      - name: Install Python 3.12
        run: uv python install 3.12

      # cluster-pending만 sentence-transformers 필요 — 무거운 의존성이라 분기.
      - name: Sync dependencies
        run: |
          COMMAND="${{ inputs.command || 'ingest' }}"
          if [ "$COMMAND" = "cluster-pending" ]; then
            uv sync --frozen --extra embedding
          else
            uv sync --frozen
          fi

      # HuggingFace 모델 캐시 — paraphrase-multilingual-MiniLM-L12-v2 약 470MB.
      # 첫 실행만 다운로드, 이후 cache hit으로 30초 내 부팅.
      - name: Cache HuggingFace models
        if: ${{ inputs.command == 'cluster-pending' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-paraphrase-multilingual-MiniLM-L12-v2-v1

      - name: Run command (${{ inputs.command || 'ingest' }})
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LOG_FORMAT: json
          LOG_LEVEL: INFO
          # cluster-pending에서 실 의미 학습 임베딩 활성화. 다른 command는 영향 X.
          EMBEDDING_BACKEND: sentence_transformers
        # schedule trigger 시 inputs 없음 → ingest fallback (실 운영 — DB 적재).
        # 셋업 완료 후 cron이 dry-run이 아닌 실 ingest를 돌도록 변경.
        # subcommand별 인자가 다르므로 분기.
        run: |
          COMMAND="${{ inputs.command || 'ingest' }}"
          case "$COMMAND" in
            dry-run|ingest)
              uv run worker "$COMMAND" --whitelist ../../config/sources_whitelist.yaml
              ;;
            cluster-pending)
              uv run worker cluster-pending --lookback-hours 24
              ;;
            *)
              echo "Unknown command: $COMMAND"
              exit 2
              ;;
          esac
