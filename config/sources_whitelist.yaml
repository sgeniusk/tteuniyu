# config/sources_whitelist.yaml
# T-006 / P0a Foundation — RSS 매체 whitelist.
#
# 비협상 (CLAUDE.md rule 7).
#   tos_confirmed=true AND ingestion_enabled=true 둘 다여야 ingest 허용.
#   - tos_confirmed — 운영자가 매체 약관 직접 확인 + 변호사 검토 완료 시 true
#   - ingestion_enabled — RSS 동작 + crawler 정상 + 정정 채널 응답 확인 시 true
#
# 비협상 (ADR-009 Amendment 1).
#   stance/ideology/leaning 같은 분류 field 절대 추가 금지.
#   매체는 slug + name + 기술 메타데이터만 (4분류 라벨 폐기).
#
# harness:tos-whitelist가 다음 검증 (Sprint 0 본격 구현).
#   1. 모든 entry에 stance/ideology/leaning/political_orientation 등 분류 키 0개
#   2. 모든 active source (tos_confirmed AND ingestion_enabled)에 contact_email 존재
#   3. RSS URL이 https:// 시작
#   4. slug 중복 없음
#   5. 30개 이상 등록 (P0a Exit 기준 — PRD v1.7 §11)
#
# 운영자 활성화 절차.
#   1. 매체 RSS 주소 확인 + ToS 정독
#   2. (필요시) 매체 contact 통해 RSS ingest 동의 받기
#   3. tos_confirmed → true, confirmed_at 기록
#   4. RSS dry-run worker로 fetch 테스트
#   5. 정상 시 ingestion_enabled → true
#   6. supabase sources 테이블에 sync (worker startup 시 자동)

